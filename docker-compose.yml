services:
  postgres:
    image: postgres:15
    container_name: hypertrophia_db
    environment:
      POSTGRES_USER: hypertrophia
      POSTGRES_PASSWORD: hypertrophia123
      POSTGRES_DB: hypertrophia
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: